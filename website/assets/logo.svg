<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="coinGrad" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#FF9933"/>
      <stop offset="100%" stop-color="#cc6600"/>
    </radialGradient>
    <radialGradient id="innerGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1a0f00"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="50%" cy="20%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="#FF9933" stroke-width="1" opacity="0.3"/>
  <!-- Main coin body -->
  <circle cx="100" cy="100" r="92" fill="url(#coinGrad)"/>
  <!-- Inner dark circle -->
  <circle cx="100" cy="100" r="78" fill="url(#innerGrad)"/>
  <!-- Decorative ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.6" stroke-dasharray="4 3"/>
  <!-- Shine highlight -->
  <ellipse cx="100" cy="72" rx="40" ry="22" fill="url(#shineGrad)"/>
  <!-- MODI text -->
  <text x="100" y="108" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="#FFD700" text-anchor="middle" letter-spacing="4" filter="url(#glow)">MODI</text>
  <!-- COIN subtext -->
  <text x="100" y="128" font-family="Arial, sans-serif" font-size="11" font-weight="400" fill="#FF9933" text-anchor="middle" letter-spacing="6" opacity="0.9">COIN</text>
  <!-- Decorative dots on ring -->
  <circle cx="100" cy="10" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="100" cy="190" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="10" cy="100" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="190" cy="100" r="3" fill="#FFD700" opacity="0.8"/>
  <circle cx="29" cy="29" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="171" cy="29" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="29" cy="171" r="2" fill="#FFD700" opacity="0.5"/>
  <circle cx="171" cy="171" r="2" fill="#FFD700" opacity="0.5"/>
</svg>